name: TomBudget
options:
  bundleIdPrefix: com.tombudget
  deploymentTarget:
    iOS: "17.0"
targets:
  TomBudget:
    type: application
    platform: iOS
    sources:
      - path: TomBudget
        includes:
          - "**/*.swift"
          - "**/*.xcdatamodel"
          - "*.plist"
    settings:
      INFOPLIST_FILE: TomBudget/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.tombudget.app
      SWIFT_VERSION: "5.0"
      ENABLE_COREDATA: "YES"
