<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        body {
            font-family: 'Manrope', sans-serif;
            background: radial-gradient(circle at top right, #e0e0ff 0%, #fcf8fb 40%),
                        radial-gradient(circle at bottom left, #a4f3cb 0%, #fcf8fb 40%);
            background-attachment: fixed;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#166b4c",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#a3645a",
                    "surface-tint": "#4950c7",
                    "primary-container": "#6067df",
                    "surface-container-highest": "#e4e2e4",
                    "on-primary": "#ffffff",
                    "background": "#fcf8fb",
                    "secondary-container": "#a1f0c9",
                    "on-secondary-fixed": "#002114",
                    "on-tertiary-fixed-variant": "#6d372f",
                    "on-secondary-fixed-variant": "#005137",
                    "surface-bright": "#fcf8fb",
                    "on-tertiary-container": "#fffbff",
                    "on-tertiary-fixed": "#370d08",
                    "secondary-fixed-dim": "#88d6b0",
                    "on-primary-fixed": "#02006d",
                    "surface-container-low": "#f6f3f5",
                    "on-primary-fixed-variant": "#3035af",
                    "surface": "#fcf8fb",
                    "outline": "#767685",
                    "inverse-primary": "#bfc2ff",
                    "error": "#ba1a1a",
                    "outline-variant": "#c6c5d6",
                    "surface-variant": "#e4e2e4",
                    "surface-container-high": "#eae7ea",
                    "primary-fixed": "#e0e0ff",
                    "secondary-fixed": "#a4f3cb",
                    "surface-container": "#f0edef",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#fffbff",
                    "on-error": "#ffffff",
                    "tertiary": "#874c43",
                    "on-secondary-container": "#1d7050",
                    "surface-dim": "#dcd9dc",
                    "primary-fixed-dim": "#bfc2ff",
                    "tertiary-fixed-dim": "#ffb4a8",
                    "on-background": "#1b1b1d",
                    "on-surface": "#1b1b1d",
                    "inverse-surface": "#303032",
                    "primary": "#474dc5",
                    "on-surface-variant": "#464653",
                    "inverse-on-surface": "#f3f0f2",
                    "on-error-container": "#93000a",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ffdad4"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-sm": "8px",
                    "card-padding": "20px",
                    "margin-main": "20px",
                    "stack-lg": "24px",
                    "gutter-grid": "12px",
                    "stack-md": "16px"
            },
            "fontFamily": {
                    "headline-md": ["Manrope"],
                    "display-amount": ["Manrope"],
                    "label-caps": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "headline-lg": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "body-sm": ["Manrope"]
            },
            "fontSize": {
                    "headline-md": ["17px", {"lineHeight": "22px", "fontWeight": "600"}],
                    "display-amount": ["34px", {"lineHeight": "41px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "label-sm": ["13px", {"lineHeight": "18px", "fontWeight": "500"}],
                    "body-sm": ["15px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
</head>
<body class="text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md border-b border-white/20 shadow-sm shadow-primary/10 flex justify-between items-center px-margin-main h-16">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary/20">
<img class="w-full h-full object-cover" data-alt="A professional close-up portrait of a young man with a friendly expression, set against a soft, out-of-focus office background. The lighting is bright and natural, reflecting a modern corporate aesthetic. The overall color palette is clean and professional with soft blues and neutral whites, perfectly aligned with a high-end financial app profile." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuroXjjavYMkCvw9FQjdUDhUn-Nlablau8WWatUHPLGK4CF4pmdKq0-5IJOtRsUQaznUxKKt9QXAew7jAotju7zmt-4OBdACMdFdlv9TvAWAb-C2icS_3Iyvc9jIHKwV4zw8_LyrY9w7EZKu1dlA1YVtORllgG5VIlIwDqmoWpPdDEoEFc8feH_k4LuHxrmMrCUK5up7jc6ipvaGvBXR8UdI4lQ5lXKaZj9dn1hmEqqQ5hMbCHDdR_Jl8GpwvxetiDPjWAUGwxOPGU"/>
</div>
<span class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed">TomBudget</span>
</div>
<button class="active:scale-95 transition-transform hover:opacity-80">
<span class="material-symbols-outlined text-primary text-[28px]">notifications</span>
</button>
</header>
<main class="pt-24 px-margin-main space-y-stack-lg">
<!-- Total Remaining Card (Bento Focus) -->
<section class="glass-card rounded-[28px] p-card-padding shadow-sm">
<div class="flex justify-between items-start mb-2">
<span class="text-label-sm font-label-sm text-on-surface-variant">Total Remaining</span>
<span class="bg-secondary-container text-on-secondary-container text-[11px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">August</span>
</div>
<h1 class="text-display-amount font-display-amount text-on-surface">$2,450.80</h1>
<div class="mt-4 flex items-center gap-2">
<div class="flex-1 h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-[65%] bg-gradient-to-r from-primary to-primary-container rounded-full"></div>
</div>
<span class="text-label-sm font-label-sm text-primary">65% left</span>
</div>
</section>
<!-- Quick Actions -->
<section class="grid grid-cols-3 gap-gutter-grid">
<button class="flex flex-col items-center gap-2 active:scale-95 transition-transform">
<div class="w-full aspect-square glass-card rounded-2xl flex items-center justify-center text-primary border-primary/10">
<span class="material-symbols-outlined text-[32px]">add_circle</span>
</div>
<span class="text-label-sm font-label-sm">Add</span>
</button>
<button class="flex flex-col items-center gap-2 active:scale-95 transition-transform">
<div class="w-full aspect-square glass-card rounded-2xl flex items-center justify-center text-secondary border-secondary/10">
<span class="material-symbols-outlined text-[32px]">swap_horiz</span>
</div>
<span class="text-label-sm font-label-sm">Transfer</span>
</button>
<button class="flex flex-col items-center gap-2 active:scale-95 transition-transform">
<div class="w-full aspect-square glass-card rounded-2xl flex items-center justify-center text-tertiary border-tertiary/10">
<span class="material-symbols-outlined text-[32px]">analytics</span>
</div>
<span class="text-label-sm font-label-sm">Report</span>
</button>
</section>
<!-- Budget Breakdown Chart -->
<section class="glass-card rounded-[28px] p-card-padding">
<h2 class="text-headline-md font-headline-md mb-stack-md">Spending Analysis</h2>
<div class="relative flex items-center justify-center py-4">
<!-- Representative Image for Chart -->
<div class="w-64 h-64 relative">
<img class="w-full h-full object-contain" data-alt="A sophisticated circular data visualization chart presented in a minimalist glassmorphic style. The chart uses a refined palette of soft lavender, mint green, and coral pink segments to represent different financial categories. It is set against a clean, bright background with subtle ambient shadows, conveying a sense of transparency and precision for a premium budget management application." src="https://lh3.googleusercontent.com/aida/ADBb0ugBTyqbA6c3Ni6isdbScm52R3py1-rphomrapNtBhJPjtLgYOc6wKMgW7VdHODRs2zunDCaMiyrXkrd7p4FnDEOCl8q_gPxIMuLvIDcDS5bMSGpGX1MOI7il8Wr4gfuXXLpA9HsB53uayfTIoiiIHej795amlQggv0GbzjTWTMEWxg1owNueLh8wRygf7Nb4KTWrJu5Vq2hG9i-tVNMYIKOURk4GeEwQAOakx3TL9ezIG4jJLnqehHx4zCCi9reGEgGGHMZp6u7iQ"/>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="text-label-sm font-label-sm text-on-surface-variant">Spent</span>
<span class="text-headline-lg font-headline-lg">$1,240</span>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4 mt-4">
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-primary"></div>
<span class="text-label-sm font-label-sm">Fixed Costs</span>
</div>
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-secondary"></div>
<span class="text-label-sm font-label-sm">Lifestyle</span>
</div>
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-tertiary"></div>
<span class="text-label-sm font-label-sm">Savings</span>
</div>
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-primary-container"></div>
<span class="text-label-sm font-label-sm">Others</span>
</div>
</div>
</section>
<!-- Budget Categories Horizontal Scroll -->
<section>
<div class="flex justify-between items-center mb-stack-md">
<h2 class="text-headline-md font-headline-md">Categories</h2>
<button class="text-primary text-label-sm font-label-sm">See All</button>
</div>
<div class="flex overflow-x-auto pb-4 -mx-margin-main px-margin-main snap-x no-scrollbar gap-4">
<!-- Groceries -->
<div class="min-w-[160px] snap-start glass-card p-4 rounded-2xl border-l-4 border-l-secondary shadow-sm">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-secondary">shopping_cart</span>
<span class="text-label-sm font-label-sm truncate">Groceries</span>
</div>
<div class="text-headline-md font-headline-md mb-2">$450</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full">
<div class="h-full w-[80%] bg-secondary rounded-full"></div>
</div>
</div>
<!-- Rent -->
<div class="min-w-[160px] snap-start glass-card p-4 rounded-2xl border-l-4 border-l-primary shadow-sm">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-primary">home</span>
<span class="text-label-sm font-label-sm truncate">Rent</span>
</div>
<div class="text-headline-md font-headline-md mb-2">$1,200</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full">
<div class="h-full w-[100%] bg-primary rounded-full"></div>
</div>
</div>
<!-- Transport -->
<div class="min-w-[160px] snap-start glass-card p-4 rounded-2xl border-l-4 border-l-tertiary shadow-sm">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-tertiary">directions_car</span>
<span class="text-label-sm font-label-sm truncate">Transport</span>
</div>
<div class="text-headline-md font-headline-md mb-2">$280</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full">
<div class="h-full w-[45%] bg-tertiary rounded-full"></div>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-2 pb-6 bg-surface/90 dark:bg-inverse-surface/90 backdrop-blur-xl border-t border-white/20 shadow-[0_-4px_12px_rgba(71,77,197,0.08)] z-50 rounded-t-xl">
<div class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim font-bold bg-primary-container/20 rounded-xl px-4 py-1 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-sm text-label-sm">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:bg-surface-container-high/50 dark:hover:bg-surface-variant/20 transition-colors active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-label-sm text-label-sm">Transactions</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:bg-surface-container-high/50 dark:hover:bg-surface-variant/20 transition-colors active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined">add_circle</span>
<span class="font-label-sm text-label-sm">Add</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:bg-surface-container-high/50 dark:hover:bg-surface-variant/20 transition-colors active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined">target</span>
<span class="font-label-sm text-label-sm">Goals</span>
</div>
</nav>
</body></html>
